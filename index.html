<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swadesh Link · Ambala AI Hub 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #38bdf8; --bg: #020617; --glass: rgba(15, 23, 42, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header { position: fixed; width: 100%; padding: 20px 8%; background: var(--glass); backdrop-filter: blur(20px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: #fff; }
        .logo span { color: var(--primary); }

        /* Hero & 3D Cube */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 100px; }
        .cube-stats { perspective: 1000px; margin: 40px 0; }
        .cube { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; animation: rotate 15s infinite linear; }
        .cube-face { position: absolute; width: 120px; height: 120px; background: var(--glass); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); }
        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateY(90deg) translateZ(60px); }
        @keyframes rotate { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }

        /* Ambala District Node Map */
        .map-box { width: 90%; max-width: 1000px; height: 400px; margin: 50px auto; border-radius: 30px; overflow: hidden; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }

        .btn-ai { padding: 15px 40px; background: var(--primary); color: #000; border-radius: 50px; text-decoration: none; font-weight: 800; cursor: pointer; border: none; }
        footer { padding: 40px; text-align: center; opacity: 0.6; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <a href="#" class="logo">SWADESH<span>LINK</span></a>
        <a href="tel:+918307619156" class="btn-ai" style="padding: 10px 20px; font-size: 12px;">CALL HQ</a>
    </header>

    <section class="hero">
        <h1 style="font-size: 3rem;">AMBALA DISTRICT<br><span style="color:var(--primary);">GLOBAL AI HUB</span></h1>
        <div class="cube-stats">
            <div class="cube">
                <div class="cube-face f1">50+ Nations</div>
                <div class="cube-face f2">100% Safe</div>
            </div>
        </div>
        <button onclick="startScan()" class="btn-ai" id="scan-btn">INITIATE AI SCAN</button>
    </section>

    <section class="map-box">
        <iframe src="http://googleusercontent.com/maps.google.com/5" width="100%" height="100%" style="border:0; filter: invert(90%) hue-rotate(180deg);" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <footer>
        <p>© 2026 Swadesh Link · Ambala Cantt HQ · Quantum Integrity</p>
    </footer>

    <script>
        // AI Voice Synthesis
        window.onload = () => {
            const speech = new SpeechSynthesisUtterance("Welcome to Swadesh Link 2026. Ambala Node is Active.");
            window.speechSynthesis.speak(speech);
        };

        function startScan() {
            const btn = document.getElementById('scan-btn');
            btn.innerHTML = "SCANNING...";
            setTimeout(() => {
                btn.innerHTML = "IDENTITY VERIFIED";
                btn.style.background = "#00ff88";
            }, 2000);
        }
    </script>
</body>
</html>
